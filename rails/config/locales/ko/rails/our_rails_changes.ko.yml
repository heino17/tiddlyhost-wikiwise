      attention:
        one: "주의! 데이터가 아직 처리되지 않았습니다!"
        other: "%{count}개의 오류가 발견되었습니다! 데이터가 아직 처리되지 않았습니다!"    
      not_saved: "%{count} 개의 오류가 감지되었습니다! 귀하의 데이터는 아직 처리되지 않았습니다!"