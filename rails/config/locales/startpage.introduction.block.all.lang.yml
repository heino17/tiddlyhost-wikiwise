ja:
  startpage_introduction_block_title: "Wikiwise"
  startpage_introduction_block: |
    は、フォーク版 <strong>Tiddlyhost-Wikiwise</strong> のテストおよび開発用インストールです。
    これは <a href="https://tiddlyhost.com" target="_blank">Tiddlyhost</a> を基にしており、
    Simon Baird によって開発された、TiddlyWiki サイトを作成・ホストするための Rails アプリケーションです。

    <br><br>

    このインストールには、いくつかの便利な機能が追加されています。
    8 言語のサポート（i18n により容易に拡張可能）、Wiki のコメント・評価機能、
    そして小さなコミュニティチャットとしての Shoutbox です。

    管理画面には、オリジナルに加えて 15 種類の機能に対応する 32 個のスイッチがあります。

    <br>
    Tiddlyhost-Wikiwise は現在も開発中であり、
    時折しかアクセスできない自宅サーバー上で動作しています。

    <br><br>

    このデモではオリジナルのフッターが保持されており、一部のリンクは Simon Baird またはそのアカウントに繋がっています。

    <br>
    Tiddlyhost-Wikiwise の詳細およびソースコードは GitHub にあります：<br>
    <a href="https://github.com/heino17/tiddlyhost-wikiwise" target="_blank">https://github.com/heino17/tiddlyhost-wikiwise</a>

    <br><br>
    <u><b>このテストインストールではアカウントを作成できません！</b></u>

ko:
  startpage_introduction_block_title: "Wikiwise"
  startpage_introduction_block: |
    는 포크 버전 <strong>Tiddlyhost-Wikiwise</strong> 의 테스트 및 개발용 설치입니다.
    이는 <a href="https://tiddlyhost.com" target="_blank">Tiddlyhost</a> 를 기반으로 하며,
    Simon Baird 가 개발한 TiddlyWiki 사이트 생성 및 호스팅용 Rails 애플리케이션입니다.

    <br><br>

    이 설치에는 여러 유용한 기능이 추가되었습니다:
    8개 언어 지원(i18n으로 쉽게 확장 가능), 위키 댓글 및 평가 기능,
    그리고 작은 커뮤니티 채팅인 Shoutbox 등이 포함됩니다.

    관리자 영역에는 원본에 더해 15가지 기능을 위한 32개의 스위치가 제공됩니다.

    <br>
    Tiddlyhost-Wikiwise 는 현재도 활발히 개발 중이며,
    간헐적으로만 접속 가능한 홈 서버에서 실행되고 있습니다.

    <br><br>

    이 데모에서는 원본 푸터가 유지되어 있으며, 일부 링크는 Simon Baird 또는 그의 계정으로 연결됩니다.

    <br>
    Tiddlyhost-Wikiwise 및 소스 코드는 GitHub에서 확인할 수 있습니다:<br>
    <a href="https://github.com/heino17/tiddlyhost-wikiwise" target="_blank">https://github.com/heino17/tiddlyhost-wikiwise</a>

    <br><br>
    <u><b>이 테스트 설치에서는 계정을 생성할 수 없습니다!</b></u>

