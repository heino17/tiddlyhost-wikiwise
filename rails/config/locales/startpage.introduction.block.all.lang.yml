---
en:
  startpage_introduction_block_title: "Wikiwise"
  startpage_introduction_block: |
    is a test and development installation of the fork <strong>Tiddlyhost-Wikiwise</strong>,
    based on <a href="https://tiddlyhost.com" target="_blank">Tiddlyhost</a>,
    a Rails application developed by Simon Baird for creating and hosting TiddlyWiki sites.

    <br><br>

    It has been extended with several useful features:
    support for 8 languages (easily expandable through i18n), a comment and rating system for wikis,
    and a shoutbox as a small community chat.

    In the admin area, 32 switches for 15 different functions are available in addition to the original.

    <br>
    Tiddlyhost-Wikiwise is still under active development and runs on a
    home server that is only sporadically reachable.

    <br><br>

    In this demo, the original footer has been retained; some links lead to Simon Baird or his accounts!

    <br>
    More information about Tiddlyhost-Wikiwise and the source code can be found on GitHub:<br>
    <a href="https://github.com/heino17/tiddlyhost-wikiwise" target="_blank">https://github.com/heino17/tiddlyhost-wikiwise</a>

    <br><br>
    <u><b>Creating an account is not possible on this test installation!</b></u>

de:
  startpage_introduction_block_title: "Wikiwise"
  startpage_introduction_block: |
    ist eine Test- und Entwicklungs-Installation des Forks <strong>Tiddlyhost-Wikiwise</strong> 
    basierend auf <a href="https://tiddlyhost.com" target="_blank">Tiddlyhost</a>, 
    einer von Simon Baird entwickelten Rails-Anwendung zum Erstellen und Hosten von TiddlyWiki-Seiten.
    
    <br><br>
    
    Es wurde um mehrere nützliche Funktionen erweitert: 
    Unterstützung für 8 Sprachen (durch i18n leicht erweiterbar), Kommentar- und Bewertungsfunktion für Wikis 
    sowie eine Shoutbox als kleiner Community-Chat.
    
    Im Admin-Bereich stehen zusätzlich zum Original 32 Schalter für 15 verschiedene Funktionen zur Verfügung.
    
    <br>
    Tiddlyhost-Wikiwise befindet sich weiterhin in aktiver Entwicklung und läuft auf einem 
    sporadisch erreichbaren Home-Server.
    
    <br><br>
    
    In der vorliegenden Demo wurde der Original-Footer beibehalten, einige Links führen zu Simon Baird bzw. dessen Accounts!
    
    <br>
    Mehr Informationen zu Tiddlyhost-Wikiwise und den Quellcode findest du auf GitHub:<br>
    <a href="https://github.com/heino17/tiddlyhost-wikiwise" target="_blank">https://github.com/heino17/tiddlyhost-wikiwise</a>
    
    <br><br>
    <u><b>Das Erstellen eines Kontos ist auf dieser Testinstallation nicht möglich!</b></u>

ru:
  startpage_introduction_block_title: "Wikiwise"
  startpage_introduction_block: |
    является тестовой и разработческой установкой форка <strong>Tiddlyhost-Wikiwise</strong>,
    основанного на <a href="https://tiddlyhost.com" target="_blank">Tiddlyhost</a>,
    Rails‑приложении, созданном Саймоном Бэрдом для создания и размещения TiddlyWiki‑страниц.

    <br><br>

    Проект был расширен несколькими полезными функциями:
    поддержкой 8 языков (легко расширяемой через i18n), системой комментариев и оценок для вики,
    а также небольшой shoutbox‑чатом для сообщества.

    В админ‑панели доступны 32 переключателя для 15 различных функций, дополнительно к оригиналу.

    <br>
    Tiddlyhost-Wikiwise находится в активной разработке и работает на
    домашнем сервере, который доступен лишь время от времени.

    <br><br>

    В этой демо‑версии сохранён оригинальный футер; некоторые ссылки ведут к Саймону Бэрду или его аккаунтам!

    <br>
    Дополнительная информация о Tiddlyhost-Wikiwise и исходный код доступны на GitHub:<br>
    <a href="https://github.com/heino17/tiddlyhost-wikiwise" target="_blank">https://github.com/heino17/tiddlyhost-wikiwise</a>

    <br><br>
    <u><b>Создание учётной записи на этой тестовой установке невозможно!</b></u>

es:
  startpage_introduction_block_title: "Wikiwise"
  startpage_introduction_block: |
    es una instalación de prueba y desarrollo del fork <strong>Tiddlyhost-Wikiwise</strong>,
    basada en <a href="https://tiddlyhost.com" target="_blank">Tiddlyhost</a>,
    una aplicación Rails desarrollada por Simon Baird para crear y alojar sitios TiddlyWiki.

    <br><br>

    Se ha ampliado con varias funciones útiles:
    soporte para 8 idiomas (fácilmente ampliable mediante i18n), sistema de comentarios y valoraciones para wikis,
    y una shoutbox como pequeño chat comunitario.

    En el área de administración hay disponibles 32 interruptores para 15 funciones diferentes, además del original.

    <br>
    Tiddlyhost-Wikiwise sigue en desarrollo activo y se ejecuta en un
    servidor doméstico accesible solo de forma esporádica.

    <br><br>

    En esta demo se ha mantenido el pie de página original; algunos enlaces llevan a Simon Baird o a sus cuentas.

    <br>
    Más información sobre Tiddlyhost-Wikiwise y el código fuente en GitHub:<br>
    <a href="https://github.com/heino17/tiddlyhost-wikiwise" target="_blank">https://github.com/heino17/tiddlyhost-wikiwise</a>

    <br><br>
    <u><b>¡No es posible crear una cuenta en esta instalación de prueba!</b></u>

