zh_CN:
  empties:
    1:
      title: "TiddlyWiki（独立版）"
      description: "著名的可定制个人维基和非线性笔记本，内置核心 JavaScript。"
      tooltip: "使用内部核心插件时站点文件较大，加载和保存较慢，但下载的 TiddlyWiki 文件可在无网络情况下离线使用。"
    2:
      title: "TiddlyWiki Classic"
      description: "2012 年“TiddlyWiki5”重写之前的原始 TiddlyWiki 版本。"
      tooltip: "仍被一个小社区使用和开发，在 Tiddlyhost 上完全支持。"
    3:
      title: "TW5 JSON-Store-Test（预合并版）"
      description: "仅用于测试 — 详情见 https://github.com/simonbaird/tiddlyhost/issues/161"
      tooltip: "合并前的实验格式 — 不适合正常使用。"
    4:
      title: "TiddlyWiki 预发布构建"
      description: "TiddlyWiki 最新的夜间构建（可能不稳定）。"
      tooltip: "可能存在 bug 或未完成的新功能，不建议用于严肃用途。适合测试或预览下一版本 TiddlyWiki。"
    5:
      title: "Feather Wiki"
      description: "现代轻量级单页维基，支持 Markdown 和所见即所得编辑。"
      tooltip: "Feather Wiki 非常小（约 50KB），但支持扩展、标签、自定义样式、发布模式等功能。"
    6:
      title: "TiddlyWiki（外部核心）"
      description: "著名的可定制个人维基和非线性笔记本，采用外部核心 JavaScript。"
      tooltip: "核心插件外部托管，站点文件更小，加载和保存更快，但下载的文件无网络无法使用。"
    20:
      title: "Feather Wiki（外部核心）"
      description: "Feather Wiki 的 Feathers & Bones 版本。实验性技术预览。请谨慎使用。"
      tooltip: "使用外部 JavaScript，初始 HTML 文件仅 616 字节。目前需要 Feather Wiki 的自定义构建。"
    21:
      title: "Siteleteer"
      description: "Feather Wiki 作者打造的更轻量、更简单的单页维基。"
      tooltip: "要了解其工作原理，请查看页面干净且极易阅读的源代码。需要 Siteleteer 的自定义构建。"