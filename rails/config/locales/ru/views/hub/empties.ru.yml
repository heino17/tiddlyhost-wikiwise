ru:
  empties:
    1:
      title: "TiddlyWiki (самодостаточный)"
      description: "Знаменитый настраиваемый личный вики и нелинейный блокнот с внутренним ядром JavaScript."
      tooltip: "С внутренним плагином ядро сайт будет больше, загрузка и сохранение медленнее, но скачанный файл TiddlyWiki будет работать оффлайн даже без интернета."
    2:
      title: "TiddlyWiki Classic"
      description: "Оригинальная версия TiddlyWiki до переписывания в 2012 году на «TiddlyWiki5»."
      tooltip: "По-прежнему используется и развивается небольшой сообществом. Полностью поддерживается на Tiddlyhost."
    3:
      title: "TW5 JSON-Store-Test (Pre-Merge)"
      description: "Только для тестирования — см. https://github.com/simonbaird/tiddlyhost/issues/161"
      tooltip: "Экспериментальный формат перед слиянием — не предназначен для обычного использования."
    4:
      title: "TiddlyWiki Pre-Release сборка"
      description: "Потенциально нестабильная самая свежая ночная сборка TiddlyWiki."
      tooltip: "Не рекомендуется для серьёзного использования, так как могут быть баги или незавершённые новые функции. Используйте для тестирования или предварительного просмотра следующей версии TiddlyWiki."
    5:
      title: "Feather Wiki"
      description: "Современная и лёгкая одностраничная вики с поддержкой Markdown и WYSIWYG."
      tooltip: "Feather Wiki очень маленький (около 50 КБ), но расширяемый, поддерживает теги, свои стили, режим публикации и многое другое."
    6:
      title: "TiddlyWiki (внешнее ядро)"
      description: "Знаменитый настраиваемый личный вики и нелинейный блокнот с внешним ядром JavaScript."
      tooltip: "С внешним ядром сайт меньше, загрузка и сохранение быстрее, но скачанный файл TiddlyWiki не будет работать без интернета."
    20:
      title: "Feather Wiki (внешнее ядро)"
      description: "Вариант Feathers & Bones от Feather Wiki. Экспериментальная техническая предварительная версия. Использовать с осторожностью."
      tooltip: "С внешним JavaScript начальный HTML-файл всего 616 байт. Требует кастомной сборки Feather Wiki."
    21:
      title: "Siteleteer"
      description: "Ещё более лёгкая и простая одностраничная вики от создателя Feather Wiki."
      tooltip: "Чтобы увидеть, как это работает, посмотрите чистый и очень читаемый исходный код страницы. Требует кастомной сборки Siteleteer."